<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#02050a" />
<title>쇼타로 춤 소환하기 🪄</title>

<meta property="og:title" content="우리 팀에 쇼타로 있다 🪄" />
<meta property="og:description" content="이모지를 조합해 쇼타로의 춤 챌린지를 소환하라." />
<meta property="og:type" content="website" />

<style>
  :root{
    --grn:#3dff7a; --grn2:#22c258; --grndim:#166b33;
    --ink:#c7ffd6; --muted:#5c9e74;
    --mono:"SFMono-Regular",ui-monospace,Menlo,Monaco,Consolas,"Courier New",monospace;
    --kr:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard","Noto Sans KR",sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--mono); color:var(--ink);
    background:#02050a; overflow:hidden; position:relative;
    -webkit-user-select:none; user-select:none; touch-action:manipulation;
  }
  /* 도트 매트릭스 */
  body::before{
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:radial-gradient(rgba(61,255,122,.08) 1px, transparent 1.7px);
    background-size:15px 15px;
  }
  /* 스캔라인 + 비네트 */
  body::after{
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      repeating-linear-gradient(transparent 0 2px, rgba(0,0,0,.20) 2px 3px),
      radial-gradient(130% 90% at 50% 45%, transparent 52%, rgba(0,0,0,.65));
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes blink{50%{opacity:0}}
  @keyframes pulse{50%{transform:scale(1.2);opacity:.7}}

  #app{
    position:relative; z-index:1; height:100dvh; width:100%; max-width:520px; margin:0 auto;
    display:flex; flex-direction:column;
    padding:calc(env(safe-area-inset-top) + 26px) 18px calc(env(safe-area-inset-bottom) + 28px);
  }
  .screen{flex:1; display:flex; flex-direction:column; min-height:0;}
  .hidden{display:none !important;}

  /* Header */
  header{text-align:center; margin-bottom:6px;}
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;}
  .kicker{font-size:11px; letter-spacing:.32em; color:var(--grn2); text-shadow:0 0 8px rgba(61,255,122,.5);}
  .dexbtn{background:none; border:0; font-family:var(--mono); color:var(--grn); font-size:12px;
    cursor:pointer; padding:4px 2px; text-shadow:0 0 8px rgba(61,255,122,.5);}
  .dexbtn:active{opacity:.55;}
  .dexchip{display:inline-flex; align-items:center; gap:6px; font-family:var(--mono);
    font-size:12.5px; font-weight:700; color:var(--grn); background:#04140a;
    border:1.5px solid var(--grn); border-radius:999px; padding:8px 14px; cursor:pointer;
    text-shadow:0 0 8px rgba(61,255,122,.5); box-shadow:0 0 14px rgba(61,255,122,.28);}
  .dexchip b{color:var(--ink); font-weight:800;}
  .dexchip:active{transform:scale(.96);}
  .summon-body{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:clamp(18px,4vh,40px); min-height:0; text-align:center;}
  .summon-body header{margin-bottom:0;}
  .summon-body .circle-wrap{flex:0 0 auto;}
  .summon-body .actions{width:100%; margin-top:0;}
  h1{margin:2px 0 2px; font-size:clamp(22px,6.4vw,30px); font-weight:800; color:var(--grn);
    text-shadow:0 0 16px rgba(61,255,122,.6); letter-spacing:.01em;}
  .cursor{animation:blink 1.1s steps(1) infinite;}
  .sub{font-size:12px; color:var(--muted); margin-top:5px; line-height:1.55;}

  /* Summon circle */
  .circle-wrap{flex:1; display:flex; align-items:center; justify-content:center; min-height:0;}
  .circle{position:relative; width:min(80vw, 330px); aspect-ratio:1/1;}
  .ring{position:absolute; inset:0; border-radius:50%; border:2px dashed rgba(61,255,122,.30);
    animation:spin 34s linear infinite;}
  .ring.r2{inset:22px; border:1px dotted rgba(61,255,122,.22); animation:spin 24s linear infinite reverse;}
  .core{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:46%; aspect-ratio:1/1; border-radius:50%;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    background:radial-gradient(circle,#04160b,#020a06 72%);
    border:1px solid var(--grndim); box-shadow:inset 0 0 26px rgba(61,255,122,.12);
  }
  .core .picked{font-size:clamp(16px,5vw,22px); line-height:1.1; letter-spacing:-1px; max-width:88%; text-align:center; word-break:break-all;}
  .core .count{font-size:11px; color:var(--grn); text-shadow:0 0 8px rgba(61,255,122,.6);}
  .core .corehint{font-size:9.5px; color:var(--muted); letter-spacing:.02em;}

  .node{
    position:absolute; transform:translate(-50%,-50%);
    width:clamp(48px,14.5vw,60px); height:clamp(48px,14.5vw,60px);
    display:flex; align-items:center; justify-content:center; font-size:clamp(24px,7vw,30px);
    background:#04140a; border:1.5px solid var(--grndim); border-radius:9px; cursor:pointer;
    box-shadow:inset 0 0 0 1px rgba(61,255,122,.06);
    transition:transform .12s, border-color .15s, box-shadow .2s;
  }
  .node:active{transform:translate(-50%,-50%) scale(.9);}
  .node.on{
    border-color:var(--grn);
    box-shadow:0 0 16px rgba(61,255,122,.7), inset 0 0 20px rgba(61,255,122,.22);
    transform:translate(-50%,-50%) scale(1.13);
  }

  /* Buttons */
  .actions{margin-top:12px; display:flex; flex-direction:column; gap:10px;}
  .actions.row{flex-direction:row;}
  .actions.row .btn{flex:1; font-size:15px; padding:14px 10px;}
  .actions.row .btn.ghost{flex:0 0 42%;}
  .btn{
    appearance:none; font-family:var(--mono); cursor:pointer; font-weight:700;
    font-size:16px; padding:15px; border-radius:9px; letter-spacing:.02em;
    background:#04140a; color:var(--grn); border:1.5px solid var(--grn);
    text-shadow:0 0 8px rgba(61,255,122,.45);
    transition:transform .1s, background .15s, color .15s, box-shadow .2s;
  }
  .btn:active{transform:scale(.97);}
  .btn.primary{box-shadow:0 0 20px rgba(61,255,122,.35), inset 0 0 14px rgba(61,255,122,.1);}
  .btn:disabled{opacity:.4; border-color:var(--grndim); color:var(--grndim); box-shadow:none; text-shadow:none; cursor:not-allowed;}
  .btn.ghost{border-color:var(--grndim); color:var(--ink);}

  /* Reveal */
  #reveal{align-items:center; text-align:center;}
  .result-tag{font-size:14px; font-weight:700; color:var(--grn); letter-spacing:.02em;
    text-shadow:0 0 10px rgba(61,255,122,.6); margin-top:2px;}
  .result-title{font-size:clamp(22px,6.4vw,30px); font-weight:800; color:var(--ink);
    margin:5px 0 5px; line-height:1.12; padding:0 6px; text-shadow:0 0 12px rgba(61,255,122,.35);}
  .result-combo{display:inline-flex; align-items:center; gap:4px; font-size:19px; letter-spacing:2px;
    margin:0 0 4px; padding:5px 14px; border:1px solid var(--grndim); border-radius:7px; background:#04140a;}
  .result-dexno{font-size:11px; color:var(--muted); margin-bottom:9px; letter-spacing:.06em;}

  .video-wrap{flex:0 0 auto; padding:2px; border-radius:11px;
    background:linear-gradient(160deg,var(--grn),var(--grn2)); box-shadow:0 0 26px rgba(61,255,122,.3);}
  .video-frame{position:relative; width:min(78vw, calc((100dvh - 352px) * 9 / 16));
    aspect-ratio:9/16; border-radius:9px; overflow:hidden; background:#000;}
  .video-frame iframe{position:absolute; inset:0; width:100%; height:100%; border:0;}
  .unmute{position:absolute; inset:0; z-index:3; border:0; cursor:pointer;
    background:rgba(0,0,0,.22); display:flex; align-items:flex-end; justify-content:center; padding-bottom:16px;}
  .unmute span{font-family:var(--mono); font-size:13px; font-weight:700; color:#02140a;
    background:var(--grn); padding:9px 15px; border-radius:7px; box-shadow:0 0 16px rgba(61,255,122,.7);}
  .placeholder{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; padding:18px; text-align:center; color:var(--muted); font-size:12px;}
  .placeholder .emoji{font-size:40px;}
  #reveal .actions{width:100%; margin-top:14px;}
  #reveal .dexwide{width:100%; margin-top:10px; font-size:15px; padding:13px; border-color:var(--grn);}
  #reveal .dexwide b{color:var(--ink);}

  /* Dex */
  #dex .sub b, #dex #dexProgress{color:var(--grn); text-shadow:0 0 8px rgba(61,255,122,.5); font-weight:700;}
  .dexgrid{flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(3,1fr); gap:8px;
    padding:10px 2px 24px; align-content:start; -webkit-overflow-scrolling:touch;}
  .dexcell{position:relative; aspect-ratio:3/4; border:1px solid var(--grndim); border-radius:9px;
    background:#04120a; overflow:hidden; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:6px; text-align:center;}
  .dexcell.got{border-color:var(--grn); box-shadow:0 0 10px rgba(61,255,122,.22);}
  .dexnum{position:absolute; top:4px; left:7px; font-size:10px; color:var(--grn2);}
  .dexq{font-size:42px; color:var(--grndim); text-shadow:0 0 12px rgba(61,255,122,.18);}
  .dexthumb{width:100%; aspect-ratio:16/9; border-radius:5px; overflow:hidden; background:#000; margin-bottom:6px;}
  .dexthumb img{width:100%; height:100%; object-fit:cover; display:block;}
  .dexname{font-size:10px; color:var(--ink); line-height:1.22; word-break:break-word;}
  .dexemoji{font-size:13px; margin-top:4px; letter-spacing:-1px;}

  /* Summon overlay */
  #overlay{position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center;
    background:rgba(2,6,4,.93); opacity:0; pointer-events:none; transition:opacity .18s;}
  #overlay.show{opacity:1; pointer-events:auto;}
  .rune{display:flex; flex-direction:column; align-items:center; gap:16px;}
  .rune .glyph{font-size:56px; filter:drop-shadow(0 0 16px rgba(61,255,122,.75)); animation:pulse .8s ease-in-out infinite;}
  .rune .load{font-family:var(--mono); color:var(--grn); letter-spacing:.34em; font-size:14px; text-shadow:0 0 10px rgba(61,255,122,.7);}
  .rune .bar{width:190px; height:9px; border:1px solid var(--grndim); border-radius:2px; overflow:hidden;}
  .rune .bar i{display:block; height:100%; width:0; background:var(--grn); box-shadow:0 0 10px var(--grn); animation:fill 1s linear forwards;}
  @keyframes fill{to{width:100%}}
  .flash{position:fixed; inset:0; background:var(--grn); opacity:0; z-index:60; pointer-events:none;}
  .flash.go{animation:flash .5s ease-out;}
  @keyframes flash{0%{opacity:0}40%{opacity:.45}100%{opacity:0}}

  .credit{position:fixed; left:14px; bottom:calc(env(safe-area-inset-bottom) + 6px);
    font-family:var(--mono); font-size:10px; color:rgba(61,255,122,.35); z-index:45; pointer-events:none;}

  @media (max-height:700px){
    .sub{display:none;}
    .circle{width:min(66vw,270px);}
  }
</style>
</head>
<body>
<div id="app">

  <!-- ============ SUMMON ============ -->
  <section id="summon" class="screen">
    <div class="topbar">
      <div class="kicker">OSAKI SHOTARO</div>
      <button class="dexchip" id="openDex">📖 도감 <b id="dexCount1">0/31</b></button>
    </div>

    <div class="summon-body">
      <header>
        <h1>쇼타로 춤 소환하기<span class="cursor">_</span></h1>
        <div class="sub">1개부터 5개까지 이모지를 조합해서<br>각각 다른 쇼타로 춤을 소환해보세요!</div>
      </header>

      <div class="circle-wrap">
        <div class="circle" id="circle">
          <div class="ring"></div>
          <div class="ring r2"></div>
          <div class="core" id="core">
            <div class="picked" id="picked"></div>
            <div class="count" id="count">이모지를 고르세요</div>
            <div class="corehint" id="coreHint">1~5개 조합 가능</div>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn primary" id="summonBtn" disabled>&gt; 소환하기</button>
      </div>
    </div>
  </section>

  <!-- ============ REVEAL ============ -->
  <section id="reveal" class="screen hidden">
    <header>
      <div class="result-tag" id="rTag">우리 팀에 쇼타로 있다</div>
      <div class="result-title" id="rTitle"></div>
      <div class="result-combo" id="rCombo"></div>
      <div class="result-dexno" id="rDexno"></div>
    </header>

    <div class="video-wrap">
      <div class="video-frame" id="videoFrame"></div>
    </div>

    <div class="actions row">
      <button class="btn ghost" id="retryBtn">&#8635; 다시하기</button>
      <button class="btn" id="shareBtn">&#8599; 공유하기</button>
    </div>
    <button class="btn dexwide" id="openDex2">📖 도감 <b id="dexCount2">0/31</b> 보러가기</button>
  </section>

  <!-- ============ DEX ============ -->
  <section id="dex" class="screen hidden">
    <header>
      <div class="topbar">
        <div class="kicker">CHALLENGE DEX</div>
        <button class="dexbtn" id="closeDex">[ 닫기 ]</button>
      </div>
      <h1>챌린지 도감</h1>
      <div class="sub">수집 <b id="dexProgress">0 / 31</b> · 이 브라우저에 저장됩니다</div>
    </header>
    <div class="dexgrid" id="dexGrid"></div>
  </section>
</div>

<div class="credit">@fitohec</div>

<!-- summon animation -->
<div id="overlay">
  <div class="rune">
    <div class="glyph" id="glyph">🔥</div>
    <div class="load">SUMMONING</div>
    <div class="bar"><i></i></div>
  </div>
</div>
<div class="flash" id="flash"></div>

<script>
/* ============================================================
   ⚙️  CONFIG
   EMOJIS : 소환진 5개 이모지
   COMBOS : 31개 조합(1~5개) → 챌린지 이름 + 유튜브
   song 이 결과/도감/공유에 뜨는 챌린지 이름
   ============================================================ */
  const EMOJIS = [
    { id:'fire',   char:'🔥', vibe:'파워'   },
    { id:'bolt',   char:'🎱', vibe:'에너지' },
    { id:'water',  char:'🥃', vibe:'그루브' },
    { id:'moon',   char:'💫', vibe:'감성'   },
    { id:'flower', char:'🍓', vibe:'큐트'   },
  ];

  const COMBOS = [
    // 1개 (5)
    { on:['fire'],   song:'Hooligan',      youtube:'nC80Zdrorbk' },
    { on:['bolt'],   song:'Gila Gila',     youtube:'Qyb99UPU4iU' },
    { on:['water'],  song:'삐그덕',         youtube:'-jA79Xg8B7k' },
    { on:['moon'],   song:'404 · New Era', youtube:'CB4y4aYHb54' },
    { on:['flower'], song:'캐논볼',         youtube:'CSWkyOKh3Gc' },
    // 2개 (10)
    { on:['fire','bolt'],   song:'쿄카 X 쇼타로',        youtube:'3dyY_gQk5cw' },
    { on:['fire','water'],  song:'TOO BAD',             youtube:'oAY_5pejAng' },
    { on:['fire','moon'],   song:'La Mamá de la Mamá',  youtube:'QFjUi0FBdH4' },
    { on:['fire','flower'], song:'Shake It To The Max', youtube:'Niken9Z4RFg' },
    { on:['bolt','water'],  song:'Freestyle',           youtube:'1DjknLePiNw' },
    { on:['bolt','moon'],   song:'See Sumn',            youtube:'qF3VvQKyCGg' },
    { on:['bolt','flower'], song:'PONPONPON',           youtube:'pgCT3aHc1fo' },
    { on:['water','moon'],  song:'Sugar On My Tongue',  youtube:'nJhGA2z3aU4' },
    { on:['water','flower'],song:'Twins',               youtube:'saQMjvEZY-c' },
    { on:['moon','flower'], song:'Snooze',              youtube:'73ndUZF_gZI' },
    // 3개 (10)
    { on:['fire','bolt','water'],   song:'Clique',             youtube:'VMv1VYwVGVc' },
    { on:['fire','bolt','moon'],    song:'Paint The Town Red', youtube:'kQESxHNqNBs' },
    { on:['fire','bolt','flower'],  song:"Buzzin'",            youtube:'Ad3gkDdQht0' },
    { on:['fire','water','moon'],   song:'Honest',             youtube:'jAnJixH4BJg' },
    { on:['fire','water','flower'], song:'Left Right',         youtube:'s7Zcl4YYgQY' },
    { on:['fire','moon','flower'],  song:'Come Back Home',     youtube:'mztud2Wp5BQ' },
    { on:['bolt','water','moon'],   song:'Universe',           youtube:'e49u5UcCKB0' },
    { on:['bolt','water','flower'], song:"That's A No No",     youtube:'icrbLDXGQXc' },
    { on:['bolt','moon','flower'],  song:'NoNoNo',             youtube:'Hx73tYx5wyI' },
    { on:['water','moon','flower'], song:'GG EZ',              youtube:'DRs2Rq_14b4' },
    // 4개 (5)
    { on:['fire','bolt','water','moon'],   song:'하이스쿨 뮤지컬',    youtube:'LmZx5Jq9ptc' },
    { on:['fire','bolt','water','flower'], song:'Sticky',           youtube:'4hx5A7x-p54' },
    { on:['fire','bolt','moon','flower'],  song:'Got It Like That', youtube:'sVDxoE9goU8' },
    { on:['fire','water','moon','flower'], song:'No Sense',         youtube:'bQJJkVvDPKw' },
    { on:['bolt','water','moon','flower'], song:'BMF',              youtube:'99OqFdvOYr8' },
    // 5개 (1)
    { on:['fire','bolt','water','moon','flower'], song:'Like JENNIE', youtube:'UxZKtfe3bl4' },
  ];

/* ==================== 엔진 ==================== */
  const EMOJI_BY_ID = Object.fromEntries(EMOJIS.map(e=>[e.id,e]));
  const $ = s => document.querySelector(s);
  const state = { selected:new Set() };
  const MIN_SELECT = 1, MAX_SELECT = 5;
  const DEX_KEY = 'shotaro_dex_v1';
  const F_MONO='ui-monospace,Menlo,monospace', F_KR='-apple-system,"Apple SD Gothic Neo",sans-serif', F_EMO='"Apple Color Emoji","Segoe UI Emoji",sans-serif';

  const COMBO_MAP = {};
  COMBOS.forEach((c,i)=>{ COMBO_MAP[[...c.on].sort().join(',')] = Object.assign({num:i+1}, c); });

  function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
  function parseYouTubeId(input){
    if(!input) return '';
    const s=String(input).trim();
    if(/^[\w-]{11}$/.test(s)) return s;
    const m=s.match(/(?:youtu\.be\/|\/shorts\/|[?&]v=|\/embed\/)([\w-]{11})/);
    return m?m[1]:'';
  }
  function resolve(ids){
    const key=[...ids].sort().join(',');
    const c=COMBO_MAP[key] || Object.assign({num:0}, COMBOS[hashStr(key)%COMBOS.length]);
    return { label:c.song, youtube:c.youtube, num:c.num, key };
  }

  function buildCircle(){
    const circle=$('#circle'); const R=42;
    EMOJIS.forEach((e,i)=>{
      const ang=(-90 + i*(360/EMOJIS.length))*Math.PI/180;
      const node=document.createElement('button');
      node.className='node'; node.textContent=e.char;
      node.style.left=(50+R*Math.cos(ang))+'%';
      node.style.top =(50+R*Math.sin(ang))+'%';
      node.dataset.id=e.id;
      node.addEventListener('click',()=>toggle(e.id,node));
      circle.appendChild(node);
    });
  }
  function toggle(id,node){
    if(state.selected.has(id)){state.selected.delete(id); node.classList.remove('on');}
    else{
      if(state.selected.size>=MAX_SELECT){ flashCount(); return; }
      state.selected.add(id); node.classList.add('on');
    }
    syncCore();
  }
  function flashCount(){ const c=$('#count'); c.animate?.([{transform:'scale(1)'},{transform:'scale(1.18)'},{transform:'scale(1)'}],{duration:240}); }
  function orderedSelected(){ return EMOJIS.filter(e=>state.selected.has(e.id)); }
  function syncCore(){
    $('#picked').textContent = orderedSelected().map(e=>e.char).join('');
    const n=state.selected.size;
    $('#count').textContent = n===0 ? '이모지를 고르세요'
                            : n>=MAX_SELECT ? '최대 '+MAX_SELECT+'개 · 소환 준비!'
                            : n+'개 선택됨';
    $('#coreHint').style.display = n===0 ? '' : 'none';
    $('#summonBtn').disabled = n<MIN_SELECT;
  }

  function summon(){
    if(state.selected.size<MIN_SELECT) return;
    const overlay=$('#overlay'), flash=$('#flash');
    $('#glyph').textContent = orderedSelected()[0].char;
    const bar=overlay.querySelector('.bar i');
    if(bar){ bar.style.animation='none'; void bar.offsetWidth; bar.style.animation=''; }
    overlay.classList.add('show');
    setTimeout(()=>{ flash.classList.add('go'); }, 650);
    setTimeout(()=>{ overlay.classList.remove('show'); flash.classList.remove('go'); showReveal(); }, 1000);
  }

  function showReveal(){
    const ids=[...state.selected];
    const res=resolve(ids);
    const chars=orderedSelected().map(e=>e.char);

    $('#rTitle').textContent=res.label;
    $('#rCombo').textContent=chars.join(' ');
    $('#rDexno').textContent='도감 #'+String(res.num).padStart(2,'0')+' 수집!';

    const vid=parseYouTubeId(res.youtube);
    const frame=$('#videoFrame');
    if(vid){
      const src=`https://www.youtube.com/embed/${vid}?autoplay=1&mute=1&playsinline=1&rel=0&modestbranding=1&loop=1&playlist=${vid}&enablejsapi=1&controls=0&fs=0&iv_load_policy=3&disablekb=1`;
      frame.innerHTML=`<iframe id="ytFrame" src="${src}" allow="autoplay; encrypted-media; picture-in-picture; fullscreen" allowfullscreen></iframe>
        <button class="unmute" id="unmuteBtn"><span>🔊 탭하여 소리 켜기</span></button>`;
      $('#unmuteBtn').addEventListener('click',()=>{
        const f=$('#ytFrame');
        try{
          f.contentWindow.postMessage('{"event":"command","func":"unMute","args":[]}','*');
          f.contentWindow.postMessage('{"event":"command","func":"playVideo","args":[]}','*');
        }catch(e){}
        $('#unmuteBtn').remove();
      });
    }else{
      frame.innerHTML=`<div class="placeholder"><div class="emoji">${chars.join('')}</div><div>${res.label}<br>유튜브 링크를 넣어주세요</div></div>`;
    }

    saveDexAdd(res.key);
    updateDexCounts();
    state.lastShare = { chars, combo:chars.join(''), label:res.label, vid, num:res.num,
      url:location.origin+location.pathname+'?s='+res.key };

    $('#summon').classList.add('hidden'); $('#dex').classList.add('hidden');
    $('#reveal').classList.remove('hidden');
  }

  function retry(){
    $('#videoFrame').innerHTML='';
    $('#reveal').classList.add('hidden');
    $('#summon').classList.remove('hidden');
  }

  /* ---------- 도감 ---------- */
  function loadDex(){ try{ return new Set(JSON.parse(localStorage.getItem(DEX_KEY)||'[]')); }catch(e){ return new Set(); } }
  function saveDexAdd(key){ const s=loadDex(); if(!s.has(key)){ s.add(key); try{ localStorage.setItem(DEX_KEY, JSON.stringify([...s])); }catch(e){} } }
  function buildDex(){
    const collected=loadDex(); const grid=$('#dexGrid'); grid.innerHTML='';
    COMBOS.forEach((c,i)=>{
      const key=[...c.on].sort().join(',');
      const got=collected.has(key);
      const num=String(i+1).padStart(2,'0');
      const cell=document.createElement('div');
      cell.className='dexcell'+(got?' got':'');
      if(got){
        const vid=parseYouTubeId(c.youtube);
        cell.innerHTML=`<div class="dexnum">#${num}</div>
          <div class="dexthumb">${vid?`<img loading="lazy" src="https://i.ytimg.com/vi/${vid}/mqdefault.jpg" alt="">`:''}</div>
          <div class="dexname">${c.song}</div>
          <div class="dexemoji">${c.on.map(id=>EMOJI_BY_ID[id].char).join('')}</div>`;
      }else{
        cell.innerHTML=`<div class="dexnum">#${num}</div><div class="dexq">?</div>`;
      }
      grid.appendChild(cell);
    });
    $('#dexProgress').textContent=collected.size+' / '+COMBOS.length;
  }
  function updateDexCounts(){
    const n=loadDex().size, t=COMBOS.length;
    document.querySelectorAll('#dexCount1,#dexCount2').forEach(el=>el.textContent=n+'/'+t);
  }
  function openDex(){
    state.dexFrom = $('#reveal').classList.contains('hidden') ? '#summon' : '#reveal';
    buildDex(); $('#summon').classList.add('hidden'); $('#reveal').classList.add('hidden'); $('#dex').classList.remove('hidden');
  }
  function closeDex(){ $('#dex').classList.add('hidden'); $(state.dexFrom||'#summon').classList.remove('hidden'); }

  /* ---------- 공유 (결과 카드 이미지 + 텍스트) ---------- */
  function loadImg(src){ return new Promise(r=>{ const i=new Image(); i.crossOrigin='anonymous'; i.onload=()=>r(i); i.onerror=()=>r(null); i.src=src; }); }
  function rr(x,a,b,w,h,r){ x.beginPath(); x.moveTo(a+r,b); x.arcTo(a+w,b,a+w,b+h,r); x.arcTo(a+w,b+h,a,b+h,r); x.arcTo(a,b+h,a,b,r); x.arcTo(a,b,a+w,b,r); x.closePath(); }
  async function buildShareCard(s){
    const W=1080,H=1350,c=document.createElement('canvas'); c.width=W; c.height=H;
    const x=c.getContext('2d');
    x.fillStyle='#03070a'; x.fillRect(0,0,W,H);
    x.fillStyle='rgba(61,255,122,.09)';
    for(let gy=24;gy<H;gy+=26) for(let gx=24;gx<W;gx+=26){ x.beginPath(); x.arc(gx,gy,1.3,0,7); x.fill(); }
    x.strokeStyle='rgba(61,255,122,.5)'; x.lineWidth=3; x.setLineDash([11,8]); rr(x,40,40,W-80,H-80,20); x.stroke(); x.setLineDash([]);
    x.textAlign='center';
    x.fillStyle='#22c258'; x.font='700 32px '+F_MONO;
    x.fillText('OSAKI SHOTARO   //   DEX #'+String(s.num).padStart(2,'0'), W/2, 128);
    x.fillStyle='#3dff7a'; x.font='800 56px '+F_KR;
    x.fillText('우리 팀에 쇼타로 있다!', W/2, 218);
    let y=270;
    if(s.vid){
      const img=await loadImg('https://i.ytimg.com/vi/'+s.vid+'/hqdefault.jpg');
      if(img){
        const iw=W-280, ih=iw*9/16, ix=(W-iw)/2, iy=y+16;
        x.save(); rr(x,ix,iy,iw,ih,16); x.clip();
        const ar=img.width/img.height, tr=iw/ih; let dw,dh,dx,dy;
        if(ar>tr){ dh=ih; dw=ih*ar; dx=ix-(dw-iw)/2; dy=iy; } else { dw=iw; dh=iw/ar; dx=ix; dy=iy-(dh-ih)/2; }
        x.drawImage(img,dx,dy,dw,dh); x.restore();
        x.strokeStyle='#3dff7a'; x.lineWidth=4; rr(x,ix,iy,iw,ih,16); x.stroke();
        y=iy+ih;
      }
    }
    let ey=y+150, ef=132; const comboStr=s.chars.join('  ');
    do{ x.font=ef+'px '+F_EMO; ef-=6; }while(x.measureText(comboStr).width>W-220 && ef>60);
    x.fillStyle='#fff'; x.fillText(comboStr, W/2, ey);
    let ny=ey+156, nf=102;
    do{ x.font='800 '+nf+'px '+F_KR; nf-=4; }while(x.measureText(s.label).width>W-180 && nf>44);
    x.fillStyle='#3dff7a'; x.shadowColor='rgba(61,255,122,.85)'; x.shadowBlur=26;
    x.fillText(s.label, W/2, ny); x.shadowBlur=0;
    x.fillStyle='rgba(199,255,214,.7)'; x.font='500 38px '+F_KR;
    x.fillText(s.combo+' 조합의 챌린지', W/2, ny+64);
    x.fillStyle='rgba(61,255,122,.6)'; x.font='700 34px '+F_MONO;
    x.fillText('dydlikeasho.github.io', W/2, H-118);
    x.fillStyle='rgba(61,255,122,.4)'; x.font='500 28px '+F_MONO;
    x.fillText('@fitohec', W/2, H-72);
    return await new Promise(res=>c.toBlob(res,'image/png',.92));
  }
  async function share(){
    const s=state.lastShare; if(!s) return;
    const text=`우리 팀에 쇼타로 있다! ${s.combo} 조합으로 ${s.label} 보기\n${s.url}`;
    let blob=null; try{ blob=await buildShareCard(s); }catch(e){}
    if(blob && navigator.canShare){
      const file=new File([blob],'shotaro-dance.png',{type:'image/png'});
      if(navigator.canShare({files:[file]})){
        try{ await navigator.share({files:[file], text}); }catch(e){}
        return;
      }
    }
    if(blob){ const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='shotaro-dance.png'; a.click(); }
    window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text),'_blank','noopener');
  }

  function applyUrlPreset(){
    const p=new URLSearchParams(location.search).get('s');
    if(!p) return;
    const ids=p.split(',').filter(id=>EMOJI_BY_ID[id]).slice(0,MAX_SELECT);
    if(ids.length<MIN_SELECT) return;
    state.selected=new Set(ids);
    document.querySelectorAll('.node').forEach(n=>{ if(state.selected.has(n.dataset.id)) n.classList.add('on'); });
    syncCore();
  }

  buildCircle();
  syncCore();
  $('#summonBtn').addEventListener('click',summon);
  $('#retryBtn').addEventListener('click',retry);
  $('#shareBtn').addEventListener('click',share);
  $('#openDex').addEventListener('click',openDex);
  $('#openDex2').addEventListener('click',openDex);
  $('#closeDex').addEventListener('click',closeDex);
  updateDexCounts();
  applyUrlPreset();
</script>
</body>
</html>
