<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#02050a" />
<title>쇼타로 춤 소환하기 🪄</title>

<!-- 공유 카드 -->
<meta property="og:title" content="우리 팀에 쇼타로 있다 🫳" />
<meta property="og:description" content="챌린지 도감 완성하기 · 이모지 넣고 쇼타로 춤 릴스 모으기" />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://dydlikeasho.github.io/" />
<meta property="og:image" content="https://dydlikeasho.github.io/og-image.jpg?v=5" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="우리 팀에 쇼타로 있다 🫳" />
<meta name="twitter:description" content="챌린지 도감 완성하기 · 이모지 넣고 쇼타로 춤 릴스 모으기" />
<meta name="twitter:image" content="https://dydlikeasho.github.io/og-image.jpg?v=5" />

<!-- Mona12 픽셀 폰트 (텍스트 + 픽셀 컬러 이모지) -->
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css">

<style>
  :root{
    --grn:#3dff7a; --grn2:#22c258; --grndim:#166b33;
    --ink:#c7ffd6; --muted:#5c9e74;
    --font:'Mona12','Mona12 Text KR','Mona12 Color Emoji','Apple Color Emoji','Segoe UI Emoji',monospace;
    --emoji:'Mona12 Color Emoji','Mona12 Emoji','Apple Color Emoji','Segoe UI Emoji',sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:var(--font); color:var(--ink);
    background:#02050a; overflow:hidden; position:relative;
    -webkit-user-select:none; user-select:none; touch-action:manipulation;
  }
  body::before{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(rgba(61,255,122,.07) 1px, transparent 1.7px); background-size:15px 15px;}
  body::after{content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
    background:repeating-linear-gradient(transparent 0 2px, rgba(0,0,0,.20) 2px 3px),
      radial-gradient(130% 90% at 50% 45%, transparent 52%, rgba(0,0,0,.65));}
  @keyframes blink{50%{opacity:0}}
  @keyframes pulse{50%{transform:scale(1.2);opacity:.7}}
  @keyframes fill{to{width:100%}}
  .emoji,.ekey,#termInput,.result-combo,.dexemoji{font-family:var(--emoji);}

  #app{position:relative; z-index:1; height:100dvh; width:100%; max-width:520px; margin:0 auto;
    display:flex; flex-direction:column;
    padding:calc(env(safe-area-inset-top) + 24px) 18px calc(env(safe-area-inset-bottom) + 26px);}
  .screen{flex:1; display:flex; flex-direction:column; min-height:0;}
  .hidden{display:none !important;}

  .topbar{display:flex; align-items:center; justify-content:space-between;}
  .kicker{font-size:11px; letter-spacing:.28em; color:var(--grn2); text-shadow:0 0 8px rgba(61,255,122,.5);}
  .dexchip{display:inline-flex; align-items:center; gap:6px; font-family:var(--font);
    font-size:12px; color:var(--grn); background:#04140a; border:1.5px solid var(--grn);
    border-radius:999px; padding:8px 14px; cursor:pointer;
    text-shadow:0 0 8px rgba(61,255,122,.5); box-shadow:0 0 14px rgba(61,255,122,.28);}
  .dexchip b{color:var(--ink);}
  .dexchip:active{transform:scale(.96);}

  /* ---- 메인: 모니터(터미널) + 키보드 ---- */
  .summon-body{flex:1; display:flex; flex-direction:column; justify-content:center; gap:clamp(14px,3vh,26px); min-height:0;}
  .monitor{width:100%; max-width:440px; margin:0 auto;}
  .term-win{background:#020c07; border:1.5px solid var(--grndim); border-radius:10px; overflow:hidden;
    box-shadow:0 0 30px rgba(61,255,122,.12), inset 0 0 44px rgba(61,255,122,.05), 0 14px 30px rgba(0,0,0,.5);}
  .term-bar{display:flex; align-items:center; gap:7px; padding:9px 11px; background:#04140a; border-bottom:1px solid var(--grndim);}
  .term-bar .dot{width:10px; height:10px; border-radius:50%;}
  .term-bar .dot:nth-child(1){background:#ff5f56}
  .term-bar .dot:nth-child(2){background:#ffbd2e}
  .term-bar .dot:nth-child(3){background:#27c93f}
  .term-title{margin-left:8px; font-size:10px; color:var(--muted);}
  .term-body{padding:15px 15px 17px; font-size:13px; line-height:1.75;}
  .tline{color:var(--ink); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .tline.dim{color:var(--muted);}
  .tline.cmt{color:var(--grn2);}
  .tline.ind{padding-left:16px; color:var(--muted);}
  .tline.in{color:var(--grn); margin-top:6px; font-size:15px;}
  #termInput{color:var(--grn); letter-spacing:1px;}
  .bcur{color:var(--grn); animation:blink 1s steps(1) infinite;}
  .term-stand{width:80px; height:14px; margin:0 auto; background:#04140a;
    border:1px solid var(--grndim); border-top:0; border-radius:0 0 8px 8px;}

  .keyboard{width:100%; max-width:440px; margin:0 auto;}
  .krow{display:flex; gap:8px; justify-content:center;}
  .key{font-family:var(--font); cursor:pointer; color:var(--grn); background:#080f0b;
    border:2px solid #26402f; border-bottom-width:4px; border-radius:9px;
    box-shadow:0 2px 0 rgba(0,0,0,.4); transition:transform .08s, box-shadow .12s, background .14s, border-color .14s, opacity .14s, filter .14s;}
  .ekey{flex:1; max-width:66px; aspect-ratio:1/1; display:flex; align-items:center; justify-content:center;
    font-size:clamp(24px,7vw,30px); opacity:.42; filter:grayscale(.6) brightness(.85);}
  .key:active{transform:translateY(2px); border-bottom-width:2px;}
  .ekey.on{opacity:1; filter:none; background:#0e4a24; border-color:var(--grn);
    box-shadow:0 0 20px rgba(61,255,122,.8), inset 0 0 14px rgba(61,255,122,.3);
    transform:translateY(2px); border-bottom-width:2px;}
  .enter{width:100%; margin-top:12px; padding:15px; font-size:16px; color:var(--grn);
    border-color:var(--grn2); text-shadow:0 0 8px rgba(61,255,122,.45);}
  .enter:disabled{opacity:.4; border-color:var(--grndim); color:var(--grndim); box-shadow:none; cursor:not-allowed;}

  /* ---- 결과 ---- */
  #reveal{align-items:center; text-align:center;}
  .result-tag{font-size:14px; color:var(--grn); letter-spacing:.01em; margin-top:2px;
    text-shadow:0 0 10px rgba(61,255,122,.6);}
  .result-title{font-size:clamp(21px,6vw,28px); color:var(--ink); margin:3px 0 3px; line-height:1.12; padding:0 6px;
    text-shadow:0 0 12px rgba(61,255,122,.35);}
  .result-combo{display:inline-flex; align-items:center; gap:4px; font-size:18px; letter-spacing:2px;
    margin:0 0 2px; padding:4px 13px; border:1px solid var(--grndim); border-radius:7px; background:#04140a;}
  .result-dexno{font-size:11px; color:var(--muted); margin-bottom:6px; letter-spacing:.05em;}

  .video-wrap{flex:0 0 auto; padding:2px; border-radius:11px;
    background:linear-gradient(160deg,var(--grn),var(--grn2)); box-shadow:0 0 26px rgba(61,255,122,.3);}
  .video-frame{position:relative; width:min(94vw, calc((100dvh - 234px) * 9 / 16));
    aspect-ratio:9/16; border-radius:9px; overflow:hidden; background:#000;}
  .video-frame iframe, .video-frame #ytHost{position:absolute; inset:0; width:100%; height:100%; border:0;}
  .unmute{position:absolute; inset:0; z-index:3; border:0; cursor:pointer;
    background:linear-gradient(180deg, transparent 55%, rgba(0,0,0,.5)); display:flex; align-items:flex-end; justify-content:center; padding-bottom:16px;}
  .unmute.loading{cursor:default; background:rgba(0,0,0,.35);}
  .unmute.gone{background:transparent;}
  .unmute span{font-family:var(--font); font-size:13px; color:#02140a; text-align:center;
    background:var(--grn); padding:9px 15px; border-radius:7px; box-shadow:0 0 16px rgba(61,255,122,.7);}
  .unmute.loading span{color:var(--grn); background:transparent; box-shadow:none; opacity:.85;}
  .placeholder{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:10px; padding:18px; text-align:center; color:var(--muted); font-size:12px;}
  .placeholder .emoji{font-size:40px;}

  .actions{margin-top:12px; display:flex; flex-direction:column; gap:10px;}
  .actions.row{flex-direction:row;}
  .actions.row .btn{flex:1; font-size:15px; padding:14px 10px;}
  .actions.row .btn.ghost{flex:0 0 42%;}
  .btn{font-family:var(--font); cursor:pointer; font-size:16px; padding:15px; border-radius:9px;
    background:#04140a; color:var(--grn); border:1.5px solid var(--grn); text-shadow:0 0 8px rgba(61,255,122,.45);
    transition:transform .1s, background .15s, color .15s;}
  .btn:active{transform:scale(.97);}
  .btn.ghost{border-color:var(--grndim); color:var(--ink);}
  #reveal .actions{width:100%; margin-top:9px;}
  #reveal .actions.row .btn{padding:12px 10px;}
  #reveal .dexwide{width:100%; margin-top:7px; font-size:13px; padding:9px; border-color:var(--grn);}
  #reveal .dexwide b{color:var(--ink);}

  /* ---- 도감 ---- */
  #dex{min-height:0;}
  #dex .sub b{color:var(--grn); text-shadow:0 0 8px rgba(61,255,122,.5);}
  #dex .sub{font-size:12px; color:var(--muted); margin-top:4px;}
  .dexgrid{flex:1; overflow-y:auto; display:grid; grid-template-columns:repeat(3,1fr); grid-auto-rows:200px; gap:15px;
    padding:12px 2px; align-content:start; -webkit-overflow-scrolling:touch;}
  .dexcell{position:relative; border:1px solid var(--grndim); border-radius:9px; background:#04120a; overflow:hidden;}
  .dexcell.got{border-color:var(--grn); box-shadow:0 0 10px rgba(61,255,122,.22); cursor:pointer;}
  .dexcell.got:active{transform:scale(.97);}
  .dexthumb{position:absolute; inset:0; background:#000;}
  .dexthumb img{position:absolute; inset:0; width:100%; height:100%; object-fit:cover; display:block;}
  .dexlock{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    font-size:44px; color:rgba(61,255,122,.42); text-shadow:0 0 14px rgba(61,255,122,.3);}
  .dexnum{position:absolute; top:5px; left:5px; font-size:9px; color:var(--grn); z-index:2;
    background:rgba(0,0,0,.6); padding:1px 5px; border-radius:4px;}
  .dexcap{position:absolute; left:0; right:0; bottom:0; z-index:2; padding:16px 5px 6px; text-align:center;
    background:linear-gradient(180deg, transparent, rgba(0,0,0,.92));}
  .dexname{font-size:9.5px; color:#fff; line-height:1.2; word-break:break-word;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;}
  .dexemoji{font-size:11px; margin-top:1px; letter-spacing:-1px;}
  .dexfoot{flex:0 0 auto; text-align:center; font-size:10px; color:var(--muted); padding:9px 0 2px;}

  /* ---- 소환 오버레이 ---- */
  #overlay{position:fixed; inset:0; z-index:50; display:flex; align-items:center; justify-content:center;
    background:rgba(2,6,4,.93); opacity:0; pointer-events:none; transition:opacity .18s;}
  #overlay.show{opacity:1; pointer-events:auto;}
  .rune{display:flex; flex-direction:column; align-items:center; gap:16px;}
  .rune .glyph{font-size:56px; font-family:var(--emoji); filter:drop-shadow(0 0 16px rgba(61,255,122,.75)); animation:pulse .8s ease-in-out infinite;}
  .rune .load{color:var(--grn); letter-spacing:.2em; font-size:15px; text-shadow:0 0 10px rgba(61,255,122,.7);}
  .rune .bar{width:190px; height:9px; border:1px solid var(--grndim); border-radius:2px; overflow:hidden;}
  .rune .bar i{display:block; height:100%; width:0; background:var(--grn); box-shadow:0 0 10px var(--grn); animation:fill .62s linear forwards;}
  .flash{position:fixed; inset:0; background:var(--grn); opacity:0; z-index:60; pointer-events:none;}
  .flash.go{animation:flash .5s ease-out;}
  @keyframes flash{0%{opacity:0}40%{opacity:.45}100%{opacity:0}}
  .confetti{position:fixed; inset:0; z-index:70; pointer-events:none;}

  .credit{position:fixed; left:14px; bottom:calc(env(safe-area-inset-bottom) + 6px);
    font-family:var(--font); font-size:10px; color:rgba(61,255,122,.35); z-index:45; pointer-events:none;}

  @media (max-height:720px){
    .term-body{font-size:12px; line-height:1.6; padding:12px;}
    .ekey{max-width:58px;}
  }
</style>
</head>
<body>
<div id="app">

  <!-- ============ SUMMON ============ -->
  <section id="summon" class="screen">
    <div class="topbar">
      <div class="kicker">OSAKI SHOTARO</div>
      <button class="dexchip" id="openDex">📖 도감 <b id="dexCount1">0/31</b></button>
    </div>

    <div class="summon-body">
      <div class="monitor">
        <div class="term-win">
          <div class="term-bar"><span class="dot"></span><span class="dot"></span><span class="dot"></span>
            <span class="term-title">dydlikeasho</span></div>
          <div class="term-body">
            <div class="tline dim">osaki_shotaro_do_your_dance</div>
            <div class="tline">$ ./summon.sho</div>
            <div class="tline">&nbsp;</div>
            <div class="tline cmt"># How to use</div>
            <div class="tline">1. 이모지를 입력해주세요.</div>
            <div class="tline ind">1개 ~ 5개 입력 가능, 순서 무관</div>
            <div class="tline">2. Enter 로 결과를 확인하세요.</div>
            <div class="tline">&nbsp;</div>
            <div class="tline in">&gt; <span id="termInput"></span><span class="bcur">█</span></div>
          </div>
        </div>
        <div class="term-stand"></div>
      </div>

      <div class="keyboard">
        <div class="krow" id="emojiKeys"></div>
        <button class="key enter" id="summonBtn" disabled>Enter ⏎</button>
      </div>
    </div>
  </section>

  <!-- ============ REVEAL ============ -->
  <section id="reveal" class="screen hidden">
    <header>
      <div class="result-tag" id="rTag">우리 팀에 쇼타로 있다!🫳</div>
      <div class="result-title" id="rTitle"></div>
      <div class="result-combo" id="rCombo"></div>
      <div class="result-dexno" id="rDexno"></div>
    </header>

    <div class="video-wrap">
      <div class="video-frame" id="videoFrame"></div>
    </div>

    <div class="actions row">
      <button class="btn ghost" id="retryBtn">&#8635; 다시하기</button>
      <button class="btn" id="shareBtn">&#8599; X로 공유하기</button>
    </div>
    <button class="btn dexwide" id="openDex2">📖 도감 <b id="dexCount2">0/31</b> 보러가기</button>
  </section>

  <!-- ============ DEX ============ -->
  <section id="dex" class="screen hidden">
    <div class="topbar">
      <div class="kicker">CHALLENGE DEX</div>
      <button class="dexchip" id="closeDex">✕ 닫기</button>
    </div>
    <header style="text-align:center">
      <div class="result-title" style="margin:8px 0 2px">쇼타로 챌린지 도감</div>
      <div class="sub">수집 <b id="dexProgress">0 / 31</b></div>
    </header>
    <div class="dexgrid" id="dexGrid"></div>
    <div class="dexfoot">도감은 같은 브라우저에서만 저장돼요</div>
  </section>
</div>

<div class="credit">@fitohec</div>

<div id="overlay">
  <div class="rune">
    <div class="glyph" id="glyph">🔥</div>
    <div class="load">Loading…</div>
    <div class="bar"><i></i></div>
  </div>
</div>
<div class="flash" id="flash"></div>

<script>
/* ================= CONFIG ================= */
  const EMOJIS = [
    { id:'fire',   char:'🔥' },
    { id:'bolt',   char:'🎱' },
    { id:'water',  char:'🥃' },
    { id:'moon',   char:'💫' },
    { id:'flower', char:'🍓' },
  ];
  const COMBOS = [
    { on:['fire'],   song:'Hooligan',      youtube:'nC80Zdrorbk' },
    { on:['bolt'],   song:'Gila Gila',     youtube:'Qyb99UPU4iU' },
    { on:['water'],  song:'삐그덕 (Walk)',   youtube:'-jA79Xg8B7k' },
    { on:['moon'],   song:'404 · New Era', youtube:'CB4y4aYHb54' },
    { on:['flower'], song:'Cannonball',     youtube:'CSWkyOKh3Gc' },
    { on:['fire','bolt'],   song:'Kyoka X Shotaro',        youtube:'3dyY_gQk5cw' },
    { on:['fire','water'],  song:'TOO BAD',             youtube:'oAY_5pejAng' },
    { on:['fire','moon'],   song:'La Mamá de la Mamá',  youtube:'QFjUi0FBdH4' },
    { on:['fire','flower'], song:'Shake It To The Max', youtube:'Niken9Z4RFg' },
    { on:['bolt','water'],  song:'Freestyle',           youtube:'1DjknLePiNw' },
    { on:['bolt','moon'],   song:'See Sumn',            youtube:'qF3VvQKyCGg' },
    { on:['bolt','flower'], song:'I Like You',          youtube:'140zZbO4u_U' },
    { on:['water','moon'],  song:'Sugar On My Tongue',  youtube:'nJhGA2z3aU4' },
    { on:['water','flower'],song:'Twins',               youtube:'saQMjvEZY-c' },
    { on:['moon','flower'], song:'Snooze',              youtube:'73ndUZF_gZI' },
    { on:['fire','bolt','water'],   song:'Clique',             youtube:'4LqCQA6eLVo' },
    { on:['fire','bolt','moon'],    song:'Paint The Town Red', youtube:'kQESxHNqNBs' },
    { on:['fire','bolt','flower'],  song:"Buzzin'",            youtube:'Ad3gkDdQht0' },
    { on:['fire','water','moon'],   song:'Honest',             youtube:'jAnJixH4BJg' },
    { on:['fire','water','flower'], song:'Left Right',         youtube:'s7Zcl4YYgQY' },
    { on:['fire','moon','flower'],  song:'Come Back Home',     youtube:'mztud2Wp5BQ' },
    { on:['bolt','water','moon'],   song:'Universe',           youtube:'e49u5UcCKB0' },
    { on:['bolt','water','flower'], song:"That's A No No",     youtube:'icrbLDXGQXc' },
    { on:['bolt','moon','flower'],  song:'NoNoNo',             youtube:'Hx73tYx5wyI' },
    { on:['water','moon','flower'], song:'GG EZ',              youtube:'DRs2Rq_14b4' },
    { on:['fire','bolt','water','moon'],   song:'High School Musical',    youtube:'LmZx5Jq9ptc' },
    { on:['fire','bolt','water','flower'], song:'Sticky',           youtube:'4hx5A7x-p54' },
    { on:['fire','bolt','moon','flower'],  song:'Got It Like That', youtube:'sVDxoE9goU8' },
    { on:['fire','water','moon','flower'], song:'No Sense',         youtube:'bQJJkVvDPKw' },
    { on:['bolt','water','moon','flower'], song:'BMF',              youtube:'99OqFdvOYr8' },
    { on:['fire','bolt','water','moon','flower'], song:'Like JENNIE', youtube:'UxZKtfe3bl4' },
  ];

/* ================= 엔진 ================= */
  const EMOJI_BY_ID = Object.fromEntries(EMOJIS.map(e=>[e.id,e]));
  const $ = s => document.querySelector(s);
  const state = { selected:new Set(), lastShare:null };
  const MIN_SELECT = 1, MAX_SELECT = 5;
  const DEX_KEY = 'shotaro_dex_v1';
  const SITE = 'https://dydlikeasho.github.io/';

  const COMBO_MAP = {};
  COMBOS.forEach((c,i)=>{ COMBO_MAP[[...c.on].sort().join(',')] = Object.assign({num:i+1}, c); });

  function hashStr(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619);}return h>>>0;}
  function parseYouTubeId(input){
    if(!input) return '';
    const s=String(input).trim();
    if(/^[\w-]{11}$/.test(s)) return s;
    const m=s.match(/(?:youtu\.be\/|\/shorts\/|[?&]v=|\/embed\/)([\w-]{11})/);
    return m?m[1]:'';
  }
  function resolve(ids){
    const key=[...ids].sort().join(',');
    const c=COMBO_MAP[key] || Object.assign({num:0}, COMBOS[hashStr(key)%COMBOS.length]);
    return { label:c.song, youtube:c.youtube, num:c.num, key };
  }
  function orderedSelected(){ return EMOJIS.filter(e=>state.selected.has(e.id)); }

  /* ---- 이모지 키보드 ---- */
  function buildKeys(){
    const row=$('#emojiKeys');
    EMOJIS.forEach(e=>{
      const b=document.createElement('button');
      b.className='key ekey'; b.textContent=e.char; b.dataset.id=e.id;
      b.addEventListener('click',()=>toggleKey(e.id));
      row.appendChild(b);
    });
  }
  function toggleKey(id){
    if(state.selected.has(id)) state.selected.delete(id);
    else { if(state.selected.size>=MAX_SELECT) return; state.selected.add(id); }
    syncTerm();
  }
  function syncTerm(){
    $('#termInput').textContent = orderedSelected().map(e=>e.char).join('');
    document.querySelectorAll('.ekey').forEach(k=>k.classList.toggle('on', state.selected.has(k.dataset.id)));
    $('#summonBtn').disabled = state.selected.size < MIN_SELECT;
  }

  /* ---- 소환 → Loading → 결과 ---- */
  function summon(){
    if(state.selected.size<MIN_SELECT) return;
    const overlay=$('#overlay'), flash=$('#flash');
    $('#glyph').textContent = orderedSelected()[0].char;
    const bar=overlay.querySelector('.bar i');
    if(bar){ bar.style.animation='none'; void bar.offsetWidth; bar.style.animation=''; }
    overlay.classList.add('show');
    setTimeout(()=>{ flash.classList.add('go'); }, 380);
    setTimeout(()=>{ overlay.classList.remove('show'); flash.classList.remove('go'); showReveal(); }, 640);
  }

  function showReveal(){
    const ids=[...state.selected];
    const res=resolve(ids);
    const chars=orderedSelected().map(e=>e.char);
    $('#rTitle').textContent=res.label;
    $('#rCombo').textContent=chars.join(' ');
    $('#rDexno').textContent='도감 #'+String(res.num).padStart(2,'0')+' 수집!';
    mountVideo(parseYouTubeId(res.youtube), res.label, chars.join(''));
    saveDexAdd(res.key); updateDexCounts();
    state.lastShare = { combo:chars.join(''), label:res.label, num:res.num, url:SITE+'?s='+res.key };
    $('#summon').classList.add('hidden'); $('#dex').classList.add('hidden');
    $('#reveal').classList.remove('hidden');
    credit(false);   // 결과 화면에선 @fitohec 숨김 (버튼과 겹침)
  }
  function credit(v){ const c=document.querySelector('.credit'); if(c) c.style.display=v?'':'none'; }
  function retry(){ destroyPlayer(); $('#videoFrame').innerHTML=''; $('#reveal').classList.add('hidden'); $('#summon').classList.remove('hidden'); credit(true); syncTerm(); }

  /* ---- 유튜브 (IFrame API · 로딩 후 1탭에 소리+제목숨김) ---- */
  let ytReady=false, player=null, pendingVid=null;
  window.onYouTubeIframeAPIReady=function(){ ytReady=true; if(pendingVid){ makePlayer(pendingVid); pendingVid=null; } };
  function destroyPlayer(){ if(player){ try{player.destroy();}catch(e){} player=null; } pendingVid=null; }
  function mountVideo(vid,label,comboStr){
    destroyPlayer();
    const frame=$('#videoFrame');
    if(!vid){ frame.innerHTML=`<div class="placeholder"><div class="emoji">${comboStr}</div><div>${label}<br>유튜브 링크를 넣어주세요</div></div>`; return; }
    frame.innerHTML=`<div id="ytHost"></div><button class="unmute loading" id="unmuteBtn"><span>로딩 중…</span></button>`;
    if(ytReady) makePlayer(vid); else pendingVid=vid;
  }
  function makePlayer(vid){
    player=new YT.Player('ytHost',{ videoId:vid,
      playerVars:{autoplay:1,mute:1,controls:1,playsinline:1,loop:1,playlist:vid,rel:0,modestbranding:1,fs:1,iv_load_policy:3,disablekb:1},
      events:{ onReady:onPlayerReady } });
  }
  function onPlayerReady(e){
    try{ e.target.mute(); e.target.playVideo(); }catch(err){}
    const btn=$('#unmuteBtn'); if(!btn) return;
    btn.classList.remove('loading');
    btn.querySelector('span').textContent='🔊 탭하여 소리 켜기';
    // 탭 1번: 소리 켜고 오버레이 제거 → 이후 화면 탭은 유튜브가 직접 받아 UI 숨김/전체화면 가능
    btn.onclick=()=>{ try{ e.target.unMute(); e.target.setVolume(100); e.target.playVideo(); }catch(err){} btn.remove(); };
  }

  /* ---- 도감 ---- */
  function loadDex(){ try{ return new Set(JSON.parse(localStorage.getItem(DEX_KEY)||'[]')); }catch(e){ return new Set(); } }
  function saveDexAdd(key){ const s=loadDex(); if(!s.has(key)){ s.add(key); try{ localStorage.setItem(DEX_KEY, JSON.stringify([...s])); }catch(e){} } }
  function updateDexCounts(){ const n=loadDex().size,t=COMBOS.length; document.querySelectorAll('#dexCount1,#dexCount2').forEach(el=>el.textContent=n+'/'+t); }
  function buildDex(){
    const collected=loadDex(), grid=$('#dexGrid'); grid.innerHTML='';
    COMBOS.forEach((c,i)=>{
      const key=[...c.on].sort().join(','), got=collected.has(key), num=String(i+1).padStart(2,'0');
      const cell=document.createElement('div'); cell.className='dexcell'+(got?' got':'');
      if(got){
        const vid=parseYouTubeId(c.youtube);
        cell.innerHTML=`<div class="dexnum">#${num}</div>
          <div class="dexthumb">${vid?`<img loading="lazy" src="https://i.ytimg.com/vi/${vid}/oar2.jpg" onload="if(this.naturalWidth<=120&&!this.dataset.f){this.dataset.f=1;this.src='https://i.ytimg.com/vi/${vid}/hqdefault.jpg'}" onerror="if(!this.dataset.f){this.dataset.f=1;this.src='https://i.ytimg.com/vi/${vid}/hqdefault.jpg'}" alt="">`:''}</div>
          <div class="dexcap"><div class="dexname">${c.song}</div><div class="dexemoji">${c.on.map(id=>EMOJI_BY_ID[id].char).join('')}</div></div>`;
        cell.addEventListener('click',()=>openResult(c));
      }else{
        cell.innerHTML=`<div class="dexnum">#${num}</div><div class="dexlock">?</div>`;
      }
      grid.appendChild(cell);
    });
    $('#dexProgress').textContent=collected.size+' / '+COMBOS.length;
  }
  function openResult(c){ state.selected=new Set(c.on); showReveal(); }
  function openDex(){
    destroyPlayer(); $('#videoFrame').innerHTML='';   // 도감 들어가면 영상 정지
    buildDex();
    $('#summon').classList.add('hidden'); $('#reveal').classList.add('hidden'); $('#dex').classList.remove('hidden');
    credit(true);
    if(loadDex().size>=COMBOS.length) confetti();
  }
  function closeDex(){ destroyPlayer(); $('#dex').classList.add('hidden'); $('#reveal').classList.add('hidden'); $('#summon').classList.remove('hidden'); credit(true); syncTerm(); }

  /* ---- 컨페티 (도감 완성) ---- */
  function confetti(){
    const cv=document.createElement('canvas'); cv.className='confetti'; document.body.appendChild(cv);
    const ctx=cv.getContext('2d'); const W=cv.width=innerWidth, H=cv.height=innerHeight;
    const cols=['#3dff7a','#22c258','#c7ffd6','#ffffff','#8bff9e'];
    const P=Array.from({length:130},()=>({x:Math.random()*W,y:-30-Math.random()*H,s:5+Math.random()*7,
      vy:2.5+Math.random()*4,vx:-2+Math.random()*4,rot:Math.random()*6,vr:-.2+Math.random()*.4,c:cols[Math.random()*cols.length|0]}));
    let t=0;
    (function loop(){
      ctx.clearRect(0,0,W,H);
      P.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
        ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot); ctx.fillStyle=p.c; ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s); ctx.restore(); });
      if(++t<170) requestAnimationFrame(loop); else cv.remove();
    })();
  }

  /* ---- X 공유 (문구 프리필) ---- */
  function share(){
    const s=state.lastShare; if(!s) return;
    const n=loadDex().size, t=COMBOS.length;
    const line = n>=t ? `챌린지 도감 (${n}/${t})개 완성! 다 모았어요 💘` : `챌린지 도감 (${n}/${t})개 완성!`;
    const text=`우리 팀에 쇼타로 있다🫳\n${line}\n\n이모지 넣고 쇼타로 춤 릴스 모으기 👇\n${SITE}`;
    window.open('https://twitter.com/intent/tweet?text='+encodeURIComponent(text),'_blank','noopener');
  }

  function applyUrlPreset(){
    const p=new URLSearchParams(location.search).get('s');
    if(!p) return;
    const ids=p.split(',').filter(id=>EMOJI_BY_ID[id]).slice(0,MAX_SELECT);
    if(ids.length<MIN_SELECT) return;
    state.selected=new Set(ids); syncTerm();
  }

  buildKeys();
  syncTerm();
  updateDexCounts();
  $('#summonBtn').addEventListener('click',summon);
  $('#retryBtn').addEventListener('click',retry);
  $('#shareBtn').addEventListener('click',share);
  $('#openDex').addEventListener('click',openDex);
  $('#openDex2').addEventListener('click',openDex);
  $('#closeDex').addEventListener('click',closeDex);
  applyUrlPreset();
</script>
<script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
